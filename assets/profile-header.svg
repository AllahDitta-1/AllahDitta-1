<svg width="850" height="149" viewBox="0 0 850 149" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dripMain" x1="0" y1="0" x2="0" y2="149" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B252FF"/>
      <stop offset="0.52" stop-color="#7D22CF"/>
      <stop offset="1" stop-color="#4F1A8A"/>
    </linearGradient>
    <linearGradient id="dripSoft" x1="0" y1="0" x2="0" y2="149" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8A7FF" stop-opacity="0.95"/>
      <stop offset="0.38" stop-color="#A14EFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#6F1CC4" stop-opacity="0"/>
    </linearGradient>
    <pattern id="barsA" x="0" y="0" width="86" height="149" patternUnits="userSpaceOnUse">
      <rect x="2" y="0" width="8" height="149" rx="3" fill="url(#dripMain)"/>
      <rect x="15" y="0" width="3" height="91" rx="1.5" fill="url(#dripMain)"/>
      <rect x="22" y="0" width="6" height="128" rx="2.5" fill="url(#dripMain)"/>
      <rect x="33" y="0" width="4" height="74" rx="2" fill="url(#dripMain)"/>
      <rect x="41" y="0" width="10" height="149" rx="3.5" fill="url(#dripMain)"/>
      <rect x="56" y="0" width="3" height="102" rx="1.5" fill="url(#dripMain)"/>
      <rect x="63" y="0" width="7" height="140" rx="3" fill="url(#dripMain)"/>
      <rect x="75" y="0" width="4" height="87" rx="2" fill="url(#dripMain)"/>
    </pattern>
    <pattern id="barsB" x="0" y="0" width="94" height="149" patternUnits="userSpaceOnUse">
      <rect x="6" y="0" width="2" height="114" rx="1" fill="url(#dripSoft)"/>
      <rect x="18" y="0" width="5" height="149" rx="2.5" fill="url(#dripSoft)"/>
      <rect x="31" y="0" width="2" height="67" rx="1" fill="url(#dripSoft)"/>
      <rect x="39" y="0" width="4" height="118" rx="2" fill="url(#dripSoft)"/>
      <rect x="52" y="0" width="2" height="149" rx="1" fill="url(#dripSoft)"/>
      <rect x="61" y="0" width="3" height="95" rx="1.5" fill="url(#dripSoft)"/>
      <rect x="71" y="0" width="5" height="133" rx="2.5" fill="url(#dripSoft)"/>
      <rect x="84" y="0" width="2" height="81" rx="1" fill="url(#dripSoft)"/>
    </pattern>
    <filter id="textBlur" x="53" y="25" width="744" height="90" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="850" height="149" fill="white"/>
  <rect width="850" height="149" fill="url(#barsA)"/>
  <rect x="7" width="843" height="149" fill="url(#barsB)" opacity="0.8"/>
  <rect x="0" y="0" width="850" height="26" fill="#FFFFFF" fill-opacity="0.08"/>

  <g filter="url(#textBlur)">
    <text
      x="425"
      y="94"
      text-anchor="middle"
      fill="#5B248C"
      fill-opacity="0.58"
      font-family="Arial Black, Segoe UI, Verdana, sans-serif"
      font-size="65"
      font-weight="900"
      letter-spacing="-1.6"
    >
      Welcome to my profile!
    </text>
  </g>
</svg>
