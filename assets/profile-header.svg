      Welcome to my profile!
    </text>
  </g>

  <text x="600" y="196" text-anchor="middle" fill="url(#subText)" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="0.8">
    Full-stack projects, polished UI, and recruiter-ready work
  </text>

  <circle cx="905" cy="109" r="3" fill="#F5D0FE"/>
  <circle cx="922" cy="96" r="2.5" fill="#E9D5FF"/>
  <circle cx="940" cy="112" r="2" fill="#DDD6FE"/>
  <circle cx="288" cy="224" r="2.2" fill="#C084FC" fill-opacity="0.85"/>
  <circle cx="305" cy="238" r="1.8" fill="#DDD6FE" fill-opacity="0.8"/>
  <circle cx="322" cy="226" r="2.4" fill="#E9D5FF" fill-opacity="0.85"/>
