<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1130" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12081F"/>
      <stop offset="0.38" stop-color="#25103C"/>
      <stop offset="0.72" stop-color="#3B1362"/>
      <stop offset="1" stop-color="#1F0A34"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="0" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E9D5FF"/>
      <stop offset="0.22" stop-color="#C084FC"/>
      <stop offset="0.7" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4C1D95" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textMain" x1="320" y1="105" x2="884" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EFFF"/>
      <stop offset="1" stop-color="#D8B4FE"/>
    </linearGradient>
    <linearGradient id="subText" x1="430" y1="238" x2="768" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="blurOrb" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="glassBlur" x="230" y="58" width="740" height="186" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
