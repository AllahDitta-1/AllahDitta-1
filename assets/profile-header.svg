    </filter>
    <filter id="shadow" x="238" y="72" width="724" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="12"/>
      <feGaussianBlur stdDeviation="12"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0862745 0 0 0 0 0.0196078 0 0 0 0 0.156863 0 0 0 0.36 0"/>
    </filter>
    <filter id="textShadow" x="292" y="102" width="620" height="98" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="8"/>
      <feGaussianBlur stdDeviation="8"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0705882 0 0 0 0 0.0235294 0 0 0 0 0.129412 0 0 0 0.45 0"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#bg)"/>

  <g filter="url(#blurOrb)" opacity="0.95">
    <circle cx="205" cy="84" r="94" fill="#7C3AED"/>
    <circle cx="1045" cy="82" r="112" fill="#9333EA"/>
    <circle cx="924" cy="266" r="96" fill="#4F46E5"/>
  </g>

  <g opacity="0.95">
