    <rect x="79" y="0" width="5" height="134" rx="2.5" fill="url(#streak)"/>
    <rect x="102" y="0" width="10" height="214" rx="5" fill="url(#streak)"/>
    <rect x="131" y="0" width="6" height="168" rx="3" fill="url(#streak)"/>
    <rect x="158" y="0" width="12" height="228" rx="6" fill="url(#streak)"/>
    <rect x="191" y="0" width="6" height="147" rx="3" fill="url(#streak)"/>
    <rect x="219" y="0" width="9" height="202" rx="4.5" fill="url(#streak)"/>
    <rect x="968" y="0" width="7" height="174" rx="3.5" fill="url(#streak)"/>
    <rect x="994" y="0" width="11" height="232" rx="5.5" fill="url(#streak)"/>
    <rect x="1027" y="0" width="6" height="149" rx="3" fill="url(#streak)"/>
    <rect x="1054" y="0" width="9" height="210" rx="4.5" fill="url(#streak)"/>
    <rect x="1084" y="0" width="5" height="137" rx="2.5" fill="url(#streak)"/>
    <rect x="1107" y="0" width="12" height="224" rx="6" fill="url(#streak)"/>
    <rect x="1140" y="0" width="7" height="164" rx="3.5" fill="url(#streak)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="262" y="84" width="676" height="126" rx="28" fill="#0D0716" fill-opacity="0.42"/>
  </g>

  <g filter="url(#glassBlur)">
    <rect x="262" y="84" width="676" height="126" rx="28" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="262.75" y="84.75" width="674.5" height="124.5" rx="27.25" stroke="url(#subText)" stroke-opacity="0.26" stroke-width="1.5"/>
  </g>

  <rect x="280" y="102" width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.08"/>
  <text x="340" y="121" text-anchor="middle" fill="#E9D5FF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">PORTFOLIO</text>

  <g filter="url(#textShadow)">
